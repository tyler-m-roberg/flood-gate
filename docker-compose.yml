# ── FloodGate — local development / Docker Desktop compose ────────────────────
#
# Services
# ────────
#   ui                React SPA (nginx)            → http://localhost:3000
#   metadata-api      FastAPI metadata service      → http://localhost:8001
#   waveform-api      Go waveform service           → http://localhost:8002
#   compute-api       FastAPI compute service       → http://localhost:8003
#   minio             MinIO object storage          → http://localhost:9000 (API)
#                                                      http://localhost:9001 (console)
#   mock-data-loader  One-shot MinIO seeder         → exits after first run
#   keycloak          Keycloak OIDC dev instance    → http://localhost:8080
#
# Quick start
# ───────────
#   docker compose up --build
#
# Mock data is loaded into MinIO automatically on first `docker compose up`.
# Re-seed manually:
#   docker compose run --rm mock-data-loader
#   docker compose run --rm mock-data-loader python main.py --force   # overwrite
#
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#   Bucket: floodgate-waveforms
#   Keys:   {testId}/{eventId}/{channelId}.json
#
# Keycloak auto-setup
# ───────────────────
#   The floodgate realm is auto-imported from keycloak/floodgate-realm.json
#   on first startup (when keycloak-data volume is empty).
#
#   Pre-configured test users:
#     admin   / admin    (roles: admin, analyst)
#     analyst / analyst  (roles: analyst)
#     viewer  / viewer   (roles: viewer)
#
#   To re-import the realm after changes:
#     docker compose down -v   # removes keycloak-data volume
#     docker compose up --build
#
# nginx proxy routes (transparent to the React SPA):
#   /api/v1/waveforms/*  →  waveform-api:8002
#   /api/v1/compute/*    →  compute-api:8003
#   /api/*               →  metadata-api:8001
#
# Volumes
# ───────
#   postgres-data   Persists metadata PostgreSQL data.
#   keycloak-data   Persists Keycloak realm config.
#   minio-data      Persists waveform objects.
#   Remove with: docker compose down -v

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-bookworm
    ports:
      - "5432:5432"
    networks:
      - floodgate-net
    environment:
      POSTGRES_DB: floodgate_meta
      POSTGRES_USER: floodgate
      POSTGRES_PASSWORD: floodgate_dev
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /run/postgresql:mode=0770
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floodgate -d floodgate_meta"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 256M
        reservations:
          memory: 128M

  # ── React SPA ───────────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: floodgate-ui:local
    ports:
      - "3000:8080"
    networks:
      - floodgate-net
    depends_on:
      metadata-api:
        condition: service_healthy
      waveform-api:
        condition: service_healthy
      compute-api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M
        reservations:
          memory: 32M

  # ── FastAPI metadata service ─────────────────────────────────────────────────
  metadata-api:
    build:
      context: services/metadata-service
      dockerfile: Dockerfile
    image: floodgate-metadata:local
    ports:
      - "8001:8001"
    networks:
      - floodgate-net
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      USE_MOCK_DATA: "false"
      DATABASE_URL: "postgresql+asyncpg://floodgate:floodgate_dev@postgres:5432/floodgate_meta"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: floodgate
      KEYCLOAK_CLIENT_ID: floodgate-metadata
      KEYCLOAK_ISSUER_OVERRIDE: http://localhost:8080/realms/floodgate
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      JWT_VERIFY_AUDIENCE: "false"
      COOKIE_AUTH_ENABLED: "true"
      UVICORN_WORKERS: "1"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_TLS: "false"
      MINIO_BUCKET: floodgate-waveforms
      BFF_CLIENT_ID: floodgate-bff
      BFF_CLIENT_SECRET: floodgate-bff-secret
      BFF_APP_URL: http://localhost:3000
      KEYCLOAK_EXTERNAL_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 256M
        reservations:
          memory: 128M

  # ── Go waveform service ───────────────────────────────────────────────────────
  waveform-api:
    build:
      context: services/waveform-service
      dockerfile: Dockerfile
    image: floodgate-waveform:local
    ports:
      - "8002:8002"
    networks:
      - floodgate-net
    environment:
      PORT: "8002"
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: floodgate
      KEYCLOAK_CLIENT_ID: floodgate-waveform
      KEYCLOAK_ISSUER_OVERRIDE: http://localhost:8080/realms/floodgate
      JWT_VERIFY_AUDIENCE: "false"
      COOKIE_AUTH_ENABLED: "true"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_TLS: "false"
      MINIO_BUCKET: floodgate-waveforms
    depends_on:
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      mock-data-loader:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 64M

  # ── FastAPI compute service ───────────────────────────────────────────────────
  compute-api:
    build:
      context: services/compute-service
      dockerfile: Dockerfile
    image: floodgate-compute:local
    ports:
      - "8003:8003"
    networks:
      - floodgate-net
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      PORT: "8003"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: floodgate
      KEYCLOAK_CLIENT_ID: floodgate-compute
      KEYCLOAK_ISSUER_OVERRIDE: http://localhost:8080/realms/floodgate
      KEYCLOAK_EXTERNAL_URL: http://localhost:8080
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      JWT_VERIFY_AUDIENCE: "false"
      COOKIE_AUTH_ENABLED: "true"
      UVICORN_WORKERS: "2"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_TLS: "false"
      MINIO_BUCKET: floodgate-waveforms
    depends_on:
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      mock-data-loader:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()"
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 512M
        reservations:
          memory: 256M

  # ── MinIO object storage ──────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  (minioadmin / minioadmin)
    networks:
      - floodgate-net
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 128M

  # ── Mock waveform data loader ────────────────────────────────────────────────
  # One-shot service: runs once to seed MinIO then exits.
  # Skips objects that already exist (idempotent).
  # Re-run with:  docker compose run --rm mock-data-loader
  mock-data-loader:
    build:
      context: scripts/load_mock_waveforms
      dockerfile: Dockerfile
    image: floodgate-mock-loader:local
    networks:
      - floodgate-net
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_TLS: "false"
      MINIO_BUCKET: floodgate-waveforms
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777

  # ── Keycloak (dev mode) ──────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    networks:
      - floodgate-net
    environment:
      # Updated to use the new Bootstrap Admin variables
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      # Fix issuer: ensure tokens always carry iss=http://localhost:8080/...
      # regardless of whether the request came from inside the Docker network
      # (http://keycloak:8080) or the browser (http://localhost:8080).
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/floodgate-realm.json:/opt/keycloak/data/import/floodgate-realm.json:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "bash -c 'exec 3<>/dev/tcp/localhost/9000 && echo -e \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q UP <&3'"
      interval: 30s
      timeout: 10s
      start_period: 180s # Increased to 3 minutes to account for low CPU/RAM limits
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          memory: 256M

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  floodgate-net:
    driver: bridge
    internal: false

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  keycloak-data:
    driver: local
  minio-data:
    driver: local
