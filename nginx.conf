# ── FloodGate UI — hardened nginx server block ────────────────────────────────
# Deployed inside nginxinc/nginx-unprivileged (UID 101, port 8080).
# Included from the image's default http { ... } block via conf.d/*.conf.

# ── Gzip compression ──────────────────────────────────────────────────────────
# (gzip directives are valid in both http and server contexts)
gzip            on;
gzip_comp_level 5;
gzip_vary       on;
gzip_proxied    any;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    image/svg+xml;

server {
    listen      8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Applied at the server level; child locations that define their own
    # add_header directives must repeat these (nginx inheritance rule).
    add_header X-Frame-Options         "DENY"                              always;
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    # CSP: tighten per-environment in production (remove 'unsafe-inline' once
    # the build uses hashed/nonce'd scripts via a Vite plugin).
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src blob:; frame-ancestors 'none';"
        always;

    # ── Static assets (content-hashed filenames) ──────────────────────────────
    # Vite appends a hash to every JS/CSS chunk → immutable long-lived cache.
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers because this location has its own add_header
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Waveform service proxy ────────────────────────────────────────────────
    # nginx longest-prefix match: /api/v1/waveforms (22 chars) takes priority
    # over /api/ (5 chars) so waveform requests never hit metadata-api.
    location /api/v1/waveforms {
        proxy_pass         http://waveform-api:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_hide_header  Server;
        proxy_hide_header  X-Powered-By;
    }

    # ── Metadata API reverse proxy ────────────────────────────────────────────
    # Catches all remaining /api/* requests (tests, events, channels).
    location /api/ {
        proxy_pass         http://metadata-api:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_hide_header  Server;
        proxy_hide_header  X-Powered-By;
    }

    # ── Health check (no auth, no logging) ────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "ok\n";
    }

    # ── SPA fallback (React Router) ───────────────────────────────────────────
    # Always serve index.html for unknown paths so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached so deployments take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        # Repeat security headers (overridden by this location's add_header)
        add_header X-Frame-Options         "DENY"                              always;
        add_header X-Content-Type-Options  "nosniff"                           always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src blob:; frame-ancestors 'none';"
            always;
    }

    # ── Block dot-file access ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Remove server version from error pages ────────────────────────────────
    server_tokens off;
}
